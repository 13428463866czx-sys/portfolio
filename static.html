<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静态作品 - KSCMerror</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/subpage.css">
    <link rel="stylesheet" href="css/static.css">
</head>
<body class="subpage">
    <!-- 页面转场遮罩 -->
    <div class="page-transition"></div>
    
    <!-- 页面内容容器 -->
    <div class="page-content">
    
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-right">
                <ul class="nav-links">
                    <li><a href="dynamic.html">动态</a></li>
                    <li><a href="static.html" class="active">静态</a></li>
                    <li><a href="about.html">关于</a></li>
                </ul>
                <a href="index.html" class="logo">
                    <img src="images/logo.png" alt="KSCMerror">
                    <img src="images/logo.png" alt="KSCMerror">
                    <img src="images/logo.png" alt="KSCMerror">
                </a>
            </div>
        </div>
    </nav>

    <!-- 页面头部 -->
    <header class="page-header">
        <div class="container">
            <h1 class="page-title">
                <span class="title-en">PORTFOLIO</span>
                <span class="title-cn">静态视觉</span>
            </h1>
            
            <!-- 筛选标签 -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="landscape">风光</button>
                <button class="filter-tab" data-filter="portrait">人像</button>
                <button class="filter-tab" data-filter="still">静物</button>
                <button class="filter-tab" data-filter="street">街拍</button>
            </div>
        </div>
    </header>

    <!-- 系列网格 -->
    <section class="series-grid-section">
        <div class="container">
            <div class="series-grid" id="seriesGrid">
                <!-- 系列 1 -->
                <div class="series-card" data-category="landscape" data-series="city-night">
                    <div class="series-cover">
                        <img src="images/series/city-night/cover.jpg" alt="城市夜景">
                        <div class="series-overlay">
                            <span class="series-count">12 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">城市夜景</h3>
                        <p class="series-desc">霓虹与建筑的交响曲</p>
                    </div>
                </div>

                <!-- 系列 2 -->
                <div class="series-card" data-category="portrait" data-series="cyber-portrait">
                    <div class="series-cover">
                        <img src="images/series/cyber-portrait/cover.jpg" alt="赛博人像">
                        <div class="series-overlay">
                            <span class="series-count">8 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">赛博人像</h3>
                        <p class="series-desc">青绿与品红的光影实验</p>
                    </div>
                </div>

                <!-- 系列 3 -->
                <div class="series-card" data-category="still" data-series="product-light">
                    <div class="series-cover">
                        <img src="images/series/product-light/cover.jpg" alt="产品光影">
                        <div class="series-overlay">
                            <span class="series-count">15 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">产品光影</h3>
                        <p class="series-desc">商业静物摄影集</p>
                    </div>
                </div>

                <!-- 系列 4 -->
                <div class="series-card" data-category="street" data-series="tokyo-street">
                    <div class="series-cover">
                        <img src="images/series/tokyo-street/cover.jpg" alt="东京街头">
                        <div class="series-overlay">
                            <span class="series-count">20 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">东京街头</h3>
                        <p class="series-desc">赛博朋克圣地巡礼</p>
                    </div>
                </div>

                <!-- 系列 5 -->
                <div class="series-card" data-category="landscape" data-series="nature-light">
                    <div class="series-cover">
                        <img src="images/series/nature-light/cover.jpg" alt="自然光">
                        <div class="series-overlay">
                            <span class="series-count">10 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">自然光</h3>
                        <p class="series-desc">日出日落的光影记录</p>
                    </div>
                </div>

                <!-- 系列 6 -->
                <div class="series-card" data-category="portrait" data-series="studio-light">
                    <div class="series-cover">
                        <img src="images/series/studio-light/cover.jpg" alt="棚拍人像">
                        <div class="series-overlay">
                            <span class="series-count">6 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">棚拍人像</h3>
                        <p class="series-desc">专业灯光下的质感</p>
                    </div>
                </div>

                <!-- 系列 7 -->
                <div class="series-card" data-category="still" data-series="food-art">
                    <div class="series-cover">
                        <img src="images/series/food-art/cover.jpg" alt="美食艺术">
                        <div class="series-overlay">
                            <span class="series-count">18 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">美食艺术</h3>
                        <p class="series-desc">色彩与食欲的对话</p>
                    </div>
                </div>

                <!-- 系列 8 -->
                <div class="series-card" data-category="street" data-series="hongkong-night">
                    <div class="series-cover">
                        <img src="images/series/hongkong-night/cover.jpg" alt="香港夜行">
                        <div class="series-overlay">
                            <span class="series-count">24 张</span>
                        </div>
                    </div>
                    <div class="series-info">
                        <h3 class="series-title">香港夜行</h3>
                        <p class="series-desc">密集城市的呼吸</p>
                    </div>
                </div>
            </div>

            <!-- 分页 -->
            <div class="pagination" id="pagination">
                <button class="page-btn prev" disabled>← 上一页</button>
                <span class="page-numbers">
                    <button class="page-num active">1</button>
                    <button class="page-num">2</button>
                </span>
                <button class="page-btn next">下一页 →</button>
            </div>
        </div>
    </section>

    <!-- 系列展开面板 -->
    <div class="series-panel" id="seriesPanel">
        <div class="panel-overlay"></div>
        <div class="panel-content">
            <button class="panel-close" id="panelClose">×</button>
            <div class="panel-header">
                <h2 id="panelTitle">系列标题</h2>
                <p id="panelDesc">系列描述</p>
            </div>
            <div class="panel-gallery" id="panelGallery">
                <!-- 图片将通过JS动态插入 -->
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 KSCMerror. All rights reserved.</p>
        </div>
    </footer>

    </div><!-- /.page-content -->

    <script src="js/subpage.js"></script>
    <script src="js/static.js"></script>
</body>
</html>
