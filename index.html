<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSCMerror - 视觉设计师</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <img src="images/logo.png" alt="KSCMerror">
            </a>
            <ul class="nav-links">
                <li><a href="dynamic.html">动态</a></li>
                <li><a href="static.html">静态</a></li>
                <li><a href="#others">其它</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页 Hero 区域 -->
    <section class="hero">
        <div class="video-container">
            <video autoplay muted loop playsinline class="bg-video">
                <source src="video/showreel26.mp4" type="video/mp4">
            </video>
            <div class="video-overlay"></div>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">SHOWREEL 26 VIA KSCMERROR</h1>
            <p class="hero-subtitle">一分钟了解我的视觉风格</p>
        </div>
        <div class="scroll-indicator">
            <span class="scroll-text">向下滚动</span>
            <div class="scroll-arrow"></div>
        </div>
    </section>

    <!-- 动态作品区域 -->
    <section id="dynamic" class="section">
        <div class="container">
            <h2 class="section-title">动态作品</h2>
            
            <!-- 主视频播放区 -->
            <div class="video-showcase">
                <div class="main-video-container">
                    <video id="mainVideo" class="main-video" controls poster="images/video-cover-1.jpg">
                        <source src="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video1.mp4" type="video/mp4">
                    </video>
                    <div class="video-info">
                        <h3 id="videoTitle">作品标题 1</h3>
                        <p id="videoDesc">作品描述文字...</p>
                    </div>
                </div>
                
                <!-- 缩略图选择条 -->
                <div class="thumbnail-strip">
                    <div class="thumbnail-item active" data-index="0" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video1.mp4" data-title="作品标题 1" data-desc="作品描述文字..." data-cover="images/video-cover-1.jpg">
                        <img src="images/video-cover-1.jpg" alt="作品1">
                        <span class="thumbnail-title">作品 1</span>
                    </div>
                    <div class="thumbnail-item" data-index="1" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video2.mp4" data-title="作品标题 2" data-desc="作品描述文字..." data-cover="images/video-cover-2.jpg">
                        <img src="images/video-cover-2.jpg" alt="作品2">
                        <span class="thumbnail-title">作品 2</span>
                    </div>
                    <div class="thumbnail-item" data-index="2" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video3.mp4" data-title="作品标题 3" data-desc="作品描述文字..." data-cover="images/video-cover-3.jpg">
                        <img src="images/video-cover-3.jpg" alt="作品3">
                        <span class="thumbnail-title">作品 3</span>
                    </div>
                    <div class="thumbnail-item" data-index="3" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video4.mp4" data-title="作品标题 4" data-desc="作品描述文字..." data-cover="images/video-cover-4.jpg">
                        <img src="images/video-cover-4.jpg" alt="作品4">
                        <span class="thumbnail-title">作品 4</span>
                    </div>
                    <div class="thumbnail-item" data-index="4" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video5.mp4" data-title="作品标题 5" data-desc="作品描述文字..." data-cover="images/video-cover-5.jpg">
                        <img src="images/video-cover-5.jpg" alt="作品5">
                        <span class="thumbnail-title">作品 5</span>
                    </div>
                    <div class="thumbnail-item" data-index="5" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video6.mp4" data-title="作品标题 6" data-desc="作品描述文字..." data-cover="images/video-cover-6.jpg">
                        <img src="images/video-cover-6.jpg" alt="作品6">
                        <span class="thumbnail-title">作品 6</span>
                    </div>
                    <div class="thumbnail-item" data-index="6" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video7.mp4" data-title="作品标题 7" data-desc="作品描述文字..." data-cover="images/video-cover-7.jpg">
                        <img src="images/video-cover-7.jpg" alt="作品7">
                        <span class="thumbnail-title">作品 7</span>
                    </div>
                    <div class="thumbnail-item" data-index="7" data-video="https://your-bucket.oss-cn-hangzhou.aliyuncs.com/video8.mp4" data-title="作品标题 8" data-desc="作品描述文字..." data-cover="images/video-cover-8.jpg">
                        <img src="images/video-cover-8.jpg" alt="作品8">
                        <span class="thumbnail-title">作品 8</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 静态作品区域 -->
    <section id="static" class="section section-dark">
        <div class="container">
            <h2 class="section-title">静态作品</h2>
            <div class="works-grid">
                <div class="work-item">
                    <div class="work-placeholder">摄影 1</div>
                </div>
                <div class="work-item">
                    <div class="work-placeholder">摄影 2</div>
                </div>
                <div class="work-item">
                    <div class="work-placeholder">摄影 3</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 其它区域 -->
    <section id="others" class="section">
        <div class="container">
            <h2 class="section-title">其它</h2>
            <div class="others-content">
                <div class="about-card">
                    <h3>关于我</h3>
                    <p>视觉设计师，擅长动态影像与静物摄影，探索AIGC辅助工作流。</p>
                </div>
                <div class="project-card">
                    <h3>莉娜计划</h3>
                    <p>私人AI伴侣项目，基于Ollama与向量记忆系统。</p>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 KSCMerror. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
